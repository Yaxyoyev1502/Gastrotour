<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#faf9f6] h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl shadow-orange-100 p-10 border border-orange-50">
        <div class="text-center mb-10">
            <div class="text-3xl font-bold italic serif tracking-tighter mb-2">GASTRO<span class="text-orange-500">.</span></div>
            <p class="text-gray-400 text-sm">Boshqaruv paneliga kirish</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-red-50 text-red-500 p-4 rounded-2xl mb-6 text-sm text-center font-medium border border-red-100 italic">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">Login</label>
                <input type="text" name="username" required class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">Parol</label>
                <input type="password" name="password" required class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-5 bg-orange-600 text-white font-bold rounded-2xl hover:bg-orange-700 shadow-xl shadow-orange-200 transition-all uppercase tracking-widest text-xs">
                Kirish
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="/" class="text-gray-400 hover:text-orange-500 text-xs transition">Bosh sahifaga qaytish</a>
        </div>
    </div>

</body>
</html>
